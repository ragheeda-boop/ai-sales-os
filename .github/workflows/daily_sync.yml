name: "🔄 Apollo → Notion Daily Pipeline v2.0"

on:
  # Daily at 7 AM KSA (UTC+3 = 04:00 UTC)
  schedule:
    - cron: '0 4 * * *'

  # Manual trigger with mode selection
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental    # Last 24 hours (default daily)
          - backfill_week  # Last 7 days with checkpoint
          - backfill_month # Last 30 days with checkpoint
          - full           # Complete rebuild (slow)
      run_lead_score:
        description: 'Run Lead Score after sync?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      run_action_engine:
        description: 'Run Action Engine after scoring?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      run_sequences:
        description: 'Run Auto Sequence enrollment?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Sync → Enrich → Score (heavy — up to 5h)
  # ═══════════════════════════════════════════════════════════════════════════
  sync-and-score:
    name: "🔄 Sync → Enrich → Score → Action Ready"
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h 50min safety margin before GitHub's 6h wall

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}
      NOTION_DATABASE_ID_TASKS: ${{ secrets.NOTION_DATABASE_ID_TASKS }}
      NOTION_DATABASE_ID_MEETINGS: ${{ secrets.NOTION_DATABASE_ID_MEETINGS }}
      NOTION_DATABASE_ID_OPPORTUNITIES: ${{ secrets.NOTION_DATABASE_ID_OPPORTUNITIES }}

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────────────
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      # ─── 2. Python Setup ──────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install Dependencies ──────────────────────────────────────────
      - name: "📦 Install Dependencies"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: pip install -r requirements.txt

      # ─── 4. Run Sync (daily_sync.py v2.1) ─────────────────────────────────
      - name: "🚀 Run Sync"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: |
          MODE="${{ github.event.inputs.sync_mode || 'incremental' }}"
          echo "🔄 Sync mode: $MODE"
          case $MODE in
            incremental)    python daily_sync.py --mode incremental --hours 26 --gate strict ;;
            backfill_week)  python daily_sync.py --mode backfill --days 7 ;;
            backfill_month) python daily_sync.py --mode backfill --days 30 ;;
            full)           python daily_sync.py --mode full ;;
          esac

      # ─── 5. Job Postings Enricher ─────────────────────────────────────────
      - name: "🏗️ Job Postings Enricher"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "🏗️ Enriching companies with job postings intent..."
          python job_postings_enricher.py --limit 50

      # ─── 6. Run Lead Score ────────────────────────────────────────────────
      - name: "🎯 Run Lead Score"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: |
          echo "🎯 Running Lead Score..."
          python lead_score.py

      # ─── 7. Update Action Ready ───────────────────────────────────────────
      - name: "✅ Update Action Ready"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: |
          echo "✅ Updating Action Ready flags..."
          python action_ready_updater.py

      # ─── Pass sync stats to Job 2 ─────────────────────────────────────────
      - name: "📤 Upload Sync Stats"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-stats-${{ github.run_number }}
          path: |
            💻 CODE/Phase 3 - Sync/last_sync_stats.json
            💻 CODE/Phase 3 - Sync/daily_sync.log
            💻 CODE/Phase 3 - Sync/lead_score.log
            💻 CODE/Phase 3 - Sync/action_ready.log
            💻 CODE/Phase 3 - Sync/last_job_postings_stats.json
            💻 CODE/Phase 3 - Sync/job_postings.log
          retention-days: 1
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Action → Sequence → Meet → Track → Brief (light — under 2h)
  # ═══════════════════════════════════════════════════════════════════════════
  action-and-track:
    name: "⚡ Action → Sequence → Meet → Track → Brief"
    runs-on: ubuntu-latest
    needs: sync-and-score
    timeout-minutes: 180  # 3h max

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}
      NOTION_DATABASE_ID_TASKS: ${{ secrets.NOTION_DATABASE_ID_TASKS }}
      NOTION_DATABASE_ID_MEETINGS: ${{ secrets.NOTION_DATABASE_ID_MEETINGS }}
      NOTION_DATABASE_ID_OPPORTUNITIES: ${{ secrets.NOTION_DATABASE_ID_OPPORTUNITIES }}

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────────────
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      # ─── 2. Python Setup ──────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install Dependencies ──────────────────────────────────────────
      - name: "📦 Install Dependencies"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: pip install -r requirements.txt

      # ─── 4. Download Sync Stats from Job 1 ───────────────────────────────
      - name: "📥 Download Sync Stats"
        uses: actions/download-artifact@v4
        with:
          name: sync-stats-${{ github.run_number }}
          path: "💻 CODE/Phase 3 - Sync/"
        continue-on-error: true

      # ─── 5. Run Action Engine ─────────────────────────────────────────────
      - name: "⚡ Run Action Engine"
        if: ${{ github.event.inputs.run_action_engine != 'no' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "⚡ Running Action Engine..."
          python auto_tasks.py

      # ─── 6. Auto Sequence Enrollment ──────────────────────────────────────
      - name: "📧 Auto Sequence Enrollment"
        if: ${{ github.event.inputs.run_sequences != 'no' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "📧 Enrolling contacts in sequences..."
          python auto_sequence.py --limit 50

      # ─── 7. Meeting Tracker ───────────────────────────────────────────────
      - name: "📅 Meeting Tracker"
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "📅 Processing meetings from Notion..."
          python meeting_tracker.py --days 7

      # ─── 8. Meeting Analyzer (AI) ─────────────────────────────────────────
      - name: "🧠 Meeting Analyzer"
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🧠 Analyzing meetings with AI..."
          python meeting_analyzer.py --limit 10

      # ─── 9. Opportunity Manager ───────────────────────────────────────────
      - name: "💰 Opportunity Manager"
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "💰 Processing opportunities from meetings..."
          python opportunity_manager.py

      # ─── 10. Analytics Tracker ────────────────────────────────────────────
      - name: "📊 Analytics Tracker"
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "📊 Syncing analytics and engagement..."
          python analytics_tracker.py --days 7

      # ─── 11. Health Check ─────────────────────────────────────────────────
      - name: "🏥 Health Check"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: |
          echo "🏥 Running health check..."
          python health_check.py

      # ─── 12. Morning Brief ────────────────────────────────────────────────
      - name: "☀️ Morning Brief"
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "☀️ Generating morning brief..."
          python morning_brief.py --output file

      # ─── 13. Sales Dashboard Generator ───────────────────────────────────
      - name: "📈 Sales Dashboard Generator"
        working-directory: "💻 CODE/Phase 3 - Sync"
        continue-on-error: true
        run: |
          echo "📈 Regenerating Sales Dashboard from live Notion data..."
          python dashboard_generator.py --output "../../Sales_Dashboard_Accounts.html"

      # ─── 14. Commit Updated Dashboard ────────────────────────────────────
      - name: "💾 Commit Updated Dashboard"
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Sales_Dashboard_Accounts.html
          git diff --staged --quiet || git commit -m "📈 Auto-update Sales Dashboard [$(date '+%Y-%m-%d')]"
          git push

      # ─── 15. Upload All Logs ──────────────────────────────────────────────
      - name: "📋 Upload Logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            💻 CODE/Phase 3 - Sync/daily_sync.log
            💻 CODE/Phase 3 - Sync/lead_score.log
            💻 CODE/Phase 3 - Sync/action_ready.log
            💻 CODE/Phase 3 - Sync/auto_tasks.log
            💻 CODE/Phase 3 - Sync/auto_sequence.log
            💻 CODE/Phase 3 - Sync/job_postings.log
            💻 CODE/Phase 3 - Sync/analytics_tracker.log
            💻 CODE/Phase 3 - Sync/meeting_tracker.log
            💻 CODE/Phase 3 - Sync/meeting_analyzer.log
            💻 CODE/Phase 3 - Sync/opportunity_manager.log
            💻 CODE/Phase 3 - Sync/morning_brief.log
            💻 CODE/Phase 3 - Sync/health_check.log
            💻 CODE/Phase 3 - Sync/dashboard_generator.log
            💻 CODE/Phase 3 - Sync/last_sync_stats.json
            💻 CODE/Phase 3 - Sync/last_action_stats.json
            💻 CODE/Phase 3 - Sync/last_sequence_stats.json
            💻 CODE/Phase 3 - Sync/last_job_postings_stats.json
            💻 CODE/Phase 3 - Sync/last_analytics_stats.json
            💻 CODE/Phase 3 - Sync/last_meeting_tracker_stats.json
            💻 CODE/Phase 3 - Sync/last_analyzer_stats.json
            💻 CODE/Phase 3 - Sync/last_opportunity_stats.json
            💻 CODE/Phase 3 - Sync/dashboard_stats.json
            💻 CODE/Phase 3 - Sync/morning_brief_*.md
          retention-days: 30

      # ─── 16. Notify on Failure ────────────────────────────────────────────
      - name: "❌ Notify on Failure"
        if: failure()
        run: |
          echo "::error::Pipeline failed! Check logs for details."
          echo "=== Last 30 lines of sync log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/daily_sync.log" 2>/dev/null || echo "No sync log"
          echo "=== Last 30 lines of score log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/lead_score.log" 2>/dev/null || echo "No score log"
          echo "=== Last 30 lines of action log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/auto_tasks.log" 2>/dev/null || echo "No action log"
          echo "=== Last 30 lines of sequence log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/auto_sequence.log" 2>/dev/null || echo "No sequence log"
          echo "=== Last 30 lines of meeting tracker log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/meeting_tracker.log" 2>/dev/null || echo "No meeting tracker log"
          echo "=== Last 30 lines of opportunity manager log ==="
          tail -30 "💻 CODE/Phase 3 - Sync/opportunity_manager.log" 2>/dev/null || echo "No opportunity log"

  # ═══════════════════════════════════════════════════════════════════════════
  # WEEKLY: Score Calibration (Sundays only)
  # ═══════════════════════════════════════════════════════════════════════════
  weekly-calibration:
    name: "📐 Weekly Score Calibration"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    needs: action-and-track
    timeout-minutes: 30

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "📦 Install Dependencies"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: pip install -r requirements.txt

      - name: "📐 Score Calibration (Review Only)"
        working-directory: "💻 CODE/Phase 3 - Sync"
        run: |
          echo "📐 Running weekly score calibration analysis..."
          python score_calibrator.py --days 30 --export

      - name: "📋 Upload Calibration Report"
        