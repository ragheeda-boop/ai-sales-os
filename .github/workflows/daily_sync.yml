name: "🔄 Apollo → Notion Daily Pipeline v7.0"

on:
  # Daily at 7 AM KSA (UTC+3 = 04:00 UTC)
  schedule:
    - cron: '0 4 * * *'

  # Manual trigger with mode selection
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync Mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental    # Last 24 hours (default daily)
          - backfill_week  # Last 7 days with checkpoint
          - backfill_month # Last 30 days with checkpoint
          - full           # Complete rebuild (slow)
      run_lead_score:
        description: 'Run Lead Score after sync?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      run_action_engine:
        description: 'Run Action Engine after scoring?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      run_sequences:
        description: 'Run Auto Sequence enrollment?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enrich_mode:
        description: 'Enrichment mode (organizations/enrich)'
        required: true
        default: 'missing'
        type: choice
        options:
          - missing    # Only enrich accounts with empty Industry/Employees/Revenue
          - all        # Enrich all accounts with a domain
          - force      # Enrich all, ignore cache
          - skip       # Disable enrichment entirely

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Sync → Signals → Score (heavy — up to 5h)
  # Order rationale: all signal-writing scripts (analytics_tracker,
  # outcome_tracker, meeting_tracker, opportunity_manager) must run BEFORE
  # lead_score + action_ready_updater so that scoring reads fresh engagement
  # data. See Decision #28 (Safe Execution Order).
  # ═══════════════════════════════════════════════════════════════════════════
  sync-and-score:
    name: "🔄 Sync → Signals → Score → Action Ready"
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h 50min safety margin before GitHub's 6h wall

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}
      NOTION_DATABASE_ID_TASKS: ${{ secrets.NOTION_DATABASE_ID_TASKS }}
      NOTION_DATABASE_ID_MEETINGS: ${{ secrets.NOTION_DATABASE_ID_MEETINGS }}
      NOTION_DATABASE_ID_OPPORTUNITIES: ${{ secrets.NOTION_DATABASE_ID_OPPORTUNITIES }}

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────────────
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      # ─── 2. Python Setup ──────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install Dependencies ──────────────────────────────────────────
      - name: "📦 Install Dependencies"
        working-directory: scripts
        run: pip install -r requirements.txt

      # ─── 4. Run Sync + Enrichment (daily_sync.py v5.3) ────────────────────
      - name: "🚀 Run Sync + Enrich"
        working-directory: scripts
        run: |
          MODE="${{ github.event.inputs.sync_mode || 'incremental' }}"
          ENRICH="${{ github.event.inputs.enrich_mode || 'missing' }}"
          echo "🔄 Sync mode: $MODE | Enrich mode: $ENRICH"
          case $MODE in
            incremental)    python core/daily_sync.py --mode incremental --hours 26 --gate strict --enrich-mode $ENRICH ;;
            backfill_week)  python core/daily_sync.py --mode backfill --days 7 --enrich-mode $ENRICH ;;
            backfill_month) python core/daily_sync.py --mode backfill --days 30 --enrich-mode $ENRICH ;;
            full)           python core/daily_sync.py --mode full --enrich-mode $ENRICH ;;
          esac

      # ─── 5. AI Sales Actions Enricher (v7.0 — parse AI fields pre-score) ──
      # Parses Apollo AI Sales Actions raw block → structured sub-fields
      # (AI Priority, AI Action Type, AI Call Hook, etc.) used by Decision Layer.
      # Added in v7.0 Blueprint — was previously manual-only.
      - name: "🤖 AI Sales Actions Enricher"
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "🤖 Parsing AI Sales Actions into structured fields..."
          python enrichment/ai_sales_actions_enricher.py --execute --limit 200

      # ─── 6. Analytics Tracker (engagement sync — MUST run before scoring) ─
      # Pulls Apollo Analytics → Notion: email_open_count, replied, opened.
      # Lead Score reads these fields; scoring before analytics = stale scores.
      - name: "📊 Analytics Tracker (pre-score)"
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "📊 Syncing analytics and engagement (pre-score)..."
          python enrichment/analytics_tracker.py --days 7

      # ─── 6. Outcome Tracker (closes Task → Contact loop — pre-score) ──────
      # Writes Contact Responded, Last Contacted, Meeting Booked from completed
      # tasks. Moved ahead of scoring so the recency + meeting-booked signals
      # feed into the next score pass.
      - name: "✅ Outcome Tracker (pre-score)"
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "✅ Closing Task → Contact outcome loop (pre-score)..."
          python automation/outcome_tracker.py --execute

      # ─── 7. Meeting Tracker (pre-score stage propagation) ─────────────────
      # Sets Company Stage → Meeting for companies with confirmed meetings.
      # Must run before opportunity_manager and before lead_score so that
      # stage-sensitive logic downstream sees the correct state.
      - name: "📅 Meeting Tracker (pre-score)"
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "📅 Processing meetings from Notion (pre-score)..."
          python meetings/meeting_tracker.py --days 7

      # ─── 8. Opportunity Manager (pre-score stage propagation) ─────────────
      # Creates/advances opportunities from positive meetings. Writes Company
      # Stage → Opportunity (guarded by STAGE_TERMINAL + is_stage_regression).
      # Must run before scoring so the opportunity stage is reflected when
      # the governor + scoring pass run later in the pipeline.
      - name: "💰 Opportunity Manager (pre-score)"
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "💰 Processing opportunities from meetings (pre-score)..."
          python meetings/opportunity_manager.py

      # ─── 9. Job Postings Enricher ─────────────────────────────────────────
      - name: "🏗️ Job Postings Enricher"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "🏗️ Enriching companies with job postings intent..."
          python enrichment/job_postings_enricher.py --limit 50

      # ─── 10. Run Lead Score ───────────────────────────────────────────────
      # Reads: email_open_count, replied, email_opened, meeting_booked,
      # last_contacted — ALL of which were refreshed in steps 5–8 above.
      - name: "🎯 Run Lead Score"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: scripts
        run: |
          echo "🎯 Running Lead Score (reads fresh signals from steps 5–8)..."
          python scoring/lead_score.py

      # ─── 12. Update Action Ready ──────────────────────────────────────────
      - name: "✅ Update Action Ready"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: scripts
        run: |
          echo "✅ Updating Action Ready flags..."
          python scoring/action_ready_updater.py

      # ─── 13. Company Priority Scorer (Decision Layer v7.0) ────────────────
      # Computes Company Priority Score (CPS) → Priority Tier (P1/P2/P3)
      # → Best Contact → Next Action → Priority Reason → SLA.
      # Must run AFTER lead_score (needs contact scores) and action_ready.
      - name: "🏆 Company Priority Scorer"
        if: ${{ github.event.inputs.run_lead_score != 'no' }}
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "🏆 Computing Company Priority Scores (Decision Layer v7.0)..."
          python scoring/company_priority_scorer.py --execute --force

      # ─── Pass sync stats to Job 2 ─────────────────────────────────────────
      - name: "📤 Upload Sync Stats"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-stats-${{ github.run_number }}
          path: |
            scripts/core/last_sync_stats.json
            scripts/core/daily_sync.log
            scripts/core/enrich_cache.json
            scripts/scoring/lead_score.log
            scripts/scoring/action_ready.log
            scripts/enrichment/last_job_postings_stats.json
            scripts/enrichment/job_postings.log
            scripts/enrichment/last_analytics_stats.json
            scripts/enrichment/analytics_tracker.log
            scripts/automation/last_outcome_stats.json
            scripts/automation/outcome_tracker.log
            scripts/meetings/last_meeting_tracker_stats.json
            scripts/meetings/meeting_tracker.log
            scripts/meetings/last_opportunity_stats.json
            scripts/meetings/opportunity_manager.log
            scripts/scoring/last_cps_stats.json
            scripts/scoring/company_priority_scorer.log
            scripts/enrichment/ai_sales_actions_enricher.log
          retention-days: 1
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Action → Sequence → Meet-AI → Health (light — under 2h)
  # All signal writes (analytics, outcome, meeting, opportunity) moved to
  # Job 1 so scoring runs on fresh data. Job 2 now only handles downstream
  # actions and non-blocking AI enrichment.
  # ═══════════════════════════════════════════════════════════════════════════
  action-and-track:
    name: "⚡ Action → Sequence → Meet-AI → Health"
    runs-on: ubuntu-latest
    needs: sync-and-score
    timeout-minutes: 180  # 3h max

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}
      NOTION_DATABASE_ID_TASKS: ${{ secrets.NOTION_DATABASE_ID_TASKS }}
      NOTION_DATABASE_ID_MEETINGS: ${{ secrets.NOTION_DATABASE_ID_MEETINGS }}
      NOTION_DATABASE_ID_OPPORTUNITIES: ${{ secrets.NOTION_DATABASE_ID_OPPORTUNITIES }}

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────────────
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4

      # ─── 2. Python Setup ──────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install Dependencies ──────────────────────────────────────────
      - name: "📦 Install Dependencies"
        working-directory: scripts
        run: pip install -r requirements.txt

      # ─── 4. Download Sync Stats from Job 1 ───────────────────────────────
      - name: "📥 Download Sync Stats"
        uses: actions/download-artifact@v4
        with:
          name: sync-stats-${{ github.run_number }}
          path: scripts/
        continue-on-error: true

      # ─── 5. Run Action Engine ─────────────────────────────────────────────
      - name: "⚡ Run Action Engine"
        if: ${{ github.event.inputs.run_action_engine != 'no' }}
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "⚡ Running Action Engine..."
          python automation/auto_tasks.py

      # ─── 6. Auto Sequence Enrollment ──────────────────────────────────────
      - name: "📧 Auto Sequence Enrollment"
        if: ${{ github.event.inputs.run_sequences != 'no' }}
        working-directory: scripts
        continue-on-error: true
        run: |
          echo "📧 Enrolling contacts in sequences..."
          python automation/auto_sequence.py --limit 50

      # NOTE: Meeting Tracker, Opportunity Manager, Analytics Tracker, and
      # Outcome Tracker previously lived here (Job 2 steps 7, 9, 10, 11).
      # They were moved to Job 1 (steps 5–8) so that scoring + action_ready
      # + governance all run on fresh engagement + stage data. See
      # Decision #28 (Safe Execution Order).

      # ─── 7. Meeting Analyzer (AI — non-blocking) ──────────────────────────
      # AI enrichment only — does not write signals that scoring depends on.
      # Safe to keep in Job 2.
      - name: "🧠 Meeting Analyzer"
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        working-directory: scripts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🧠 Analyzing meetings with AI..."
          python meetings/meeting_analyzer.py --limit 10

      # ─── 8. Health Check ──────────────────────────────────────────────────
      - name: "🏥 Health Check"
        working-directory: scripts
        run: |
          echo "🏥 Running health check..."
          python monitoring/health_check.py

      # ─── 13. Morning Brief ────────────────────────────────────────────────
      # ❄️ FROZEN 2026-04-10 — Operator-First v2.0 (restore: uncomment block below)
      # - name: "☀️ Morning Brief"
      #   working-directory: scripts
      #   continue-on-error: true
      #   run: |
      #     echo "☀️ Generating morning brief..."
      #     python monitoring/morning_brief.py --output file

      # ─── 14. Sales Dashboard Generator ───────────────────────────────────
      # ❄️ FROZEN 2026-04-10 — Operator-First v2.0 (restore: uncomment block below)
      # NOTE on restore: update output path to ../dashboards/active/Sales_Dashboard_Accounts.html
      # - name: "📈 Sales Dashboard Generator"
      #   working-directory: scripts
      #   continue-on-error: true
      #   run: |
      #     echo "📈 Regenerating Sales Dashboard from live Notion data..."
      #     python monitoring/dashboard_generator.py --output "../dashboards/active/Sales_Dashboard_Accounts.html"

      # ─── 15. Commit Updated Dashboard ────────────────────────────────────
      # ❄️ FROZEN 2026-04-10 — Operator-First v2.0 (restore: uncomment block below)
      # NOTE on restore: update `git add` path to dashboards/active/Sales_Dashboard_Accounts.html
      # - name: "💾 Commit Updated Dashboard"
      #   continue-on-error: true
      #   run: |
      #     git config --local user.email "github-actions[bot]@users.noreply.github.com"
      #     git config --local user.name "github-actions[bot]"
      #     git add dashboards/active/Sales_Dashboard_Accounts.html
      #     git diff --staged --quiet || git commit -m "📈 Auto-update Sales Dashboard [$(date '+%Y-%m-%d')]"
      #     git push

      # ─── 16. Upload All Logs ──────────────────────────────────────────────
      - name: "📋 Upload Logs"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: |
            scripts/**/daily_sync.log
            scripts/**/lead_score.log
            scripts/**/action_ready.log
            scripts/**/auto_tasks.log
            scripts/**/auto_sequence.log
            scripts/**/job_postings.log
            scripts/**/analytics_tracker.log
            scripts/**/outcome_tracker*.log
            scripts/**/last_outcome_stats.json
            scripts/**/meeting_tracker.log
            scripts/**/meeting_analyzer.log
            scripts/**/opportunity_manager.log
            scripts/**/morning_brief.log
            scripts/**/health_check.log
            scripts/**/dashboard_generator.log
            scripts/**/last_sync_stats.json
            scripts/**/last_action_stats.json
            scripts/**/last_sequence_stats.json
            scripts/**/last_job_postings_stats.json
            scripts/**/last_analytics_stats.json
            scripts/**/last_meeting_tracker_stats.json
            scripts/**/last_analyzer_stats.json
            scripts/**/last_opportunity_stats.json
            scripts/**/last_cps_stats.json
            scripts/**/company_priority_scorer.log
            scripts/**/ai_sales_actions_enricher.log
            scripts/**/dashboard_stats.json
            scripts/**/morning_brief_*.md
          retention-days: 30

      # ─── 17. Notify on Failure ────────────────────────────────────────────
      - name: "❌ Notify on Failure"
        if: failure()
        run: |
          echo "::error::Pipeline failed! Check logs for details."
          echo "=== Last 30 lines of sync log ==="
          tail -30 scripts/core/daily_sync.log 2>/dev/null || echo "No sync log"
          echo "=== Last 30 lines of score log ==="
          tail -30 scripts/scoring/lead_score.log 2>/dev/null || echo "No score log"
          echo "=== Last 30 lines of action log ==="
          tail -30 scripts/automation/auto_tasks.log 2>/dev/null || echo "No action log"
          echo "=== Last 30 lines of sequence log ==="
          tail -30 scripts/automation/auto_sequence.log 2>/dev/null || echo "No sequence log"
          echo "=== Last 30 lines of meeting tracker log ==="
          tail -30 scripts/meetings/meeting_tracker.log 2>/dev/null || echo "No meeting tracker log"
          echo "=== Last 30 lines of opportunity manager log ==="
          tail -30 scripts/meetings/opportunity_manager.log 2>/dev/null || echo "No opportunity log"

  # ═══════════════════════════════════════════════════════════════════════════
  # WEEKLY: Score Calibration (Sundays only)
  # ═══════════════════════════════════════════════════════════════════════════
  weekly-calibration:
    name: "📐 Weekly Score Calibration"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
    needs: action-and-track
    timeout-minutes: 30

    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID_CONTACTS: ${{ secrets.NOTION_DATABASE_ID_CONTACTS }}
      NOTION_DATABASE_ID_COMPANIES: ${{ secrets.NOTION_DATABASE_ID_COMPANIES }}

    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "📦 Install Dependencies"
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: "📐 Score Calibration (Review Only)"
        working-directory: scripts
        run: |
          echo "📐 Running weekly score calibration analysis..."
          python scoring/score_calibrator.py --days 30 --export

      - name: "📋 Upload Calibration Report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-${{ github.run_number }}
          path: |
            scripts/scoring/score_calibrator.log
            scripts/scoring/calibration_analysis_*.json
            scripts/scoring/calibration_history.json
          retention-days: 90
